name: ci

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x

      - name: Restore
        run: dotnet restore DeltaLinq.sln

      - name: Build
        run: dotnet build DeltaLinq.sln -c Release --no-restore

      - name: Test
        run: dotnet test DeltaLinq.sln -c Release --no-build --verbosity normal
